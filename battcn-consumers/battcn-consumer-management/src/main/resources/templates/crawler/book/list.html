<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
>
<script th:inline="javascript">
    $(function () {
        /*<![CDATA[*/
        battcn.ns('battcn.admin.menu[[${OP.menuId}]]');
        $('#admin_menu[[${OP.menuId}]]_datagrid').bootstrapTable({
            url: [[${MENU.channel}]] + '/query',
            height: '100%',
            sortName: 'created_time',
            sortOrder: 'desc',
            striped: true,
            pagination: true,
            pageSize: 20,
            search: false,
            sidePagination: 'server',
            idField: 'id',
            uniqueId: 'id',
            responseHandler: responseHandler,
            queryParams: queryParams,
            minimumCountColumns: 2,
            clickToSelect: true,
            columns: [
                {
                    checkbox: true
                }, {
                    field: 'bookNo',
                    title: '编号',
                    align: 'center',
                    valign: 'middle',
                    formatter: function (value, row, index) {
                        return '<a href="javascript:void(0)">' + value + '</a>';
                    }
                }, {
                    field: 'name',
                    title: '名称',
                    align: 'center',
                    valign: 'middle',
                    width: '100px'
                },
                {
                    field: 'source',
                    title: '来源',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'type',
                    title: '类型',
                    align: 'center',
                    valign: 'middle',
                    width: '80px'
                },
                {
                    field: 'author',
                    title: '作者',
                    align: 'center',
                    valign: 'middle',
                    width: '100px'
                }, {
                    field: 'description',
                    title: '描述',
                    align: 'center',
                    valign: 'middle',
                    formatter: function (value, row, index) {
                        if (value !== null && value !== undefined && value !== '' && value.length > 100) {
                            return value.substr(0, 40) + "<a class='more' href='javascript:void(0);'>&nbsp;&nbsp;&nbsp;more...</a>";
                        }
                        return value;
                    },
                    events: {
                        'click .more': function (e, value, row, index) {
                            $(this).parent('td').html(value);
                        }
                    }
                }, {
                    field: 'createdTime',
                    title: '时间',
                    align: 'center',
                    valign: 'middle',
                    width: '140px',
                    formatter: function (value, row, index) {
                        return new Date(value).pattern("yyyy-MM-dd HH:mm")
                    }
                }, {
                    field: 'status',
                    title: '是否完结',
                    align: 'center',
                    valign: 'middle',
                    sortable: true,
                    formatter: battcn.lockedFormat
                }, {
                    field: 'generate',
                    title: '操作',
                    width: 50,
                    align: 'center',
                    valign: 'middle',
                    formatter: function (value, row, index) {
                        return '<a class="generate" href="javascript:void(0);" title="generate"><i class="fa fa-cloud-upload"></i></a>&nbsp;&nbsp;&nbsp;';
                    },
                    events: {
                        'click .generate': function (e, value, row, index) {
                            console.info("-=------>" + row);
                            // 调用后端生成工作
                            battcn.confirm(function () {
                                battcn.ajaxJson({url: '/crawler/books/' + row.bookNo + '/generate'}, function () {
                                    $('#crawler_books_chapter_datagrid').bootstrapTable('refresh');
                                });
                            });
                        }
                    }
                }],
            onClickRow: function (row, $element, field) {
                if (field === 'bookNo') {
                    // 弹出章节列表
                    battcn.showWindow({
                        title: '章节列表',
                        href: '/crawler/books/chapter/list?book_no=' + row.bookNo,
                        width: '80%',
                        height: '85%',
                        noButtons: true
                    });
                }
            }
        });

        /*]]>*/

    });
</script>
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="ibox float-e-margins">
        <div class="ibox-content">
            <div th:include="toolbar :: toolbar-operate"></div>
            <div class="table-responsive">
                <table th:id="@{admin_menu{menuId}_datagrid(menuId=${OP.menuId})}"
                       data-toolbar="#toolbar" data-show-refresh="true"
                       data-show-toggle="true" data-show-columns="true"
                       data-show-footer="false" data-mobile-responsive="true">
                </table>
            </div>
        </div>
    </div>
</div>
</html>
