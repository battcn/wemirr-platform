<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${chapter?.title}">标题</title>
    <style>
        body {
            background-color: #3D3E45;
            color: #9e9e9e;
        }

        /* 头部 */
        .header {
            background-color: #fff;
            height: 35px;
            text-align: left;
        }

        /* 整体大容器 */
        .re-content {
            background-color: #EAEAEA;
            width: 80%;
            margin: 15px auto 0;
            text-align: center;
        }

        /* 导航控制区域 */
        .re-content .control {
            border-bottom: 1px solid #3D3E45;
            padding: 32px 35px 30px;
            font-size: 12px;
            overflow: hidden;
        }

        .re-content .control .nav {
            float: left;
        }

        .re-content .control .nav a {
            color: #9e9e9e;
            margin: 0 6px;
        }

        /* 正文部分 */
        .re-content .content {
            overflow: hidden;
            padding: 60px 70px 0;
        }

        .re-content .content h2 {
            font-style: normal;
            font-weight: normal;
            font-size: 32px;
            color: #333;
            text-align: center;
            margin-bottom: 24px;
        }

        .re-content .content .co-info li {
            display: inline-block;
            font-size: 12px;
        }

        .re-content .content .co-text p {
            text-align: left;
            text-indent: 2em;
            line-height: 2em;
            letter-spacing: 2px;
            padding-bottom: 2em;
        }

        /* 响应式样式 */
        @media (max-width: 525px) {
            .re-content .control {
                padding: 19px 12px 16px;
            }

            .re-content .content h2 {
                font-size: 19px;
            }

            .re-content .content {
                padding: 13px 14px 0;
            }
        }
    </style>
</head>
<body>
<div class="bookRead">
    <div class="header"></div>
    <div class="re-content">
        <div class="control"> <!-- 功能控制 -->
            <span class="nav">
          <a href="javascript:">首页</a> >
          <a href="javascript:" th:text="${book?.type}">未知分类</a> >
          <a href="javascript:" th:text="${book?.name}">书名</a>
        </span>
        </div>
        <div class="content">
            <h2 th:text="${chapter?.title}">章节</h2>
            <ul class="co-info">
                <li>作者：<span th:text="${book?.author}"></span></li>
                <li>类别：<span th:text="${book?.type}">未知分类</span></li>
                <li>更新时间：<span>1个月前</span></li>
                <li>本章字数：<span>3035</span></li>
            </ul>
            <div class="co-text" th:utext="${chapter?.content}"></div>
        </div>
    </div>
</div>
</body>
</html>
