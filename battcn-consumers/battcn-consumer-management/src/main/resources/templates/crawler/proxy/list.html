<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
>
<script th:inline="javascript">
    $(function () {
        /*<![CDATA[*/
        battcn.ns('battcn.admin.menu[[${OP.menuId}]]');
        $('#admin_menu[[${OP.menuId}]]_datagrid').bootstrapTable({
            url: [[${MENU.channel}]] + '/query',
            height: '100%',
            sortName: 'gmt_create',
            sortOrder: 'desc',
            striped: true,
            pagination: true,
            pageSize: 10,
            pageList: [10, 25, 50, 100, 200],
            search: false,
            sidePagination: 'server',
            idField: 'id',
            uniqueId: 'id',
            responseHandler: responseHandler,
            queryParams: queryParams,
            minimumCountColumns: 2,
            clickToSelect: true,
            columns: [
                {
                    checkbox: true
                }, {
                    field: 'host',
                    title: '代理IP',
                    align: 'center',
                    valign: 'middle',
                    sortable: true
                }, {
                    field: 'port',
                    title: '代理端口',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'anonymity',
                    title: '匿名度',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'type',
                    title: '类型',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'location',
                    title: '归属地',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'validateTime',
                    title: '验证时间',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'locked',
                    title: '是否可用',
                    align: 'center',
                    valign: 'middle',
                    sortable: true,
                    formatter: function (value, row, index) {
                        return value === 1 ? '<i class="fa fa-check text-navy"></i>' : '<i class="fa fa-close text-danger"></i>'
                    }
                }, {
                    field: 'gmt_create',
                    title: '创建时间',
                    align: 'center',
                    valign: 'middle',
                    sortable: true
                }]

        });

        //更新代理
        battcn.admin.menu[[${OP.menuId}]].crawler = function () {
            battcn.confirm(function () {
                battcn.ajaxJson({url: '/op_crawler_[[${OP.menuId}]]'}, function () {
                    $('#admin_menu[[${OP.menuId}]]_datagrid').bootstrapTable('refresh');
                });
            });
        }

        /*]]>*/

    });
</script>
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="ibox float-e-margins">
        <div class="ibox-content">
            <div th:include="toolbar :: toolbar-operate"></div>
            <div class="table-responsive">
                <table th:id="@{admin_menu{menuId}_datagrid(menuId=${OP.menuId})}"
                       data-toolbar="#toolbar" data-show-refresh="true"
                       data-show-toggle="true" data-show-columns="true"
                       data-show-footer="false" data-mobile-responsive="true">
                </table>
            </div>
        </div>
    </div>
</div>
</html>
