server:
  port: 8085
spring:
  application:
    name: battcn-management-consumer
  profiles:
    active: prod
  swagger:
    base-package: com.battcn
  thymeleaf:
    cache: false
    content-type: text/html
    encoding: UTF-8
    mode: HTML5
    prefix: classpath:/templates/  
    suffix: .html

management:
  port: 8083
  health:
    db:
      enabled: false
    dubbo:
      status:
        defaults: memory
dubbo:
  application:
    id: battcn-management-consumer
    name: battcn-management-consumer
    qos-port: 22223
  consumer:
    timeout: 10000
endpoints:
  dubbo:
    enabled: true

---
# 开发环境
spring:
  profiles: dev
template-storage-path: D:/html/
template-domain-name: file:///

---
# Linux部署环境
spring:
  profiles: prod
template-storage-path: /data/battcn3.0/template/
template-domain-name: http://book.battcn.com/template/