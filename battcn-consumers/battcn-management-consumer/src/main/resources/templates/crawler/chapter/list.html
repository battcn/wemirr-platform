<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
>
<script th:inline="javascript">
    $(function () {
        /*<![CDATA[*/
        $('#crawler_books_chapter_datagrid').bootstrapTable({
            url: '/crawler/books/' + [[${bookNo}]] + '/chapters',
            height: '100%',
            sortName: 'gmt_modified',
            sortOrder: 'desc',
            striped: true,
            pagination: true,
            pageSize: 15,
            search: false,
            sidePagination: 'server',
            idField: 'id',
            uniqueId: 'id',
            responseHandler: responseHandler,
            queryParams: queryParams,
            minimumCountColumns: 2,
            clickToSelect: true,
            columns: [
                {
                    checkbox: true
                }, {
                    field: 'bookNo',
                    title: '编号',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'source',
                    title: '原文链接',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'target',
                    title: '模板链接',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'title',
                    title: '标题',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'gmtCreate',
                    title: '时间',
                    align: 'center',
                    valign: 'middle',
                    width: '140px',
                    formatter: function (value, row, index) {
                        return new Date(value).pattern("yyyy-MM-dd HH:mm");
                    }
                }, {
                    field: 'status',
                    title: '是否已生成模板',
                    align: 'center',
                    valign: 'middle',
                    sortable: true,
                    formatter: battcn.lockedFormat
                }, {
                    field: 'id',
                    title: '操作',
                    width: 120,
                    align: 'center',
                    valign: 'middle',
                    formatter: operateFormatter,
                    events: {
                        'click #generate': function (e, value, row, index) {
                            // 调用后端生成工作
                            battcn.confirm(function () {
                                battcn.ajaxJson({url: '/crawler/chapters/' + value + '/generate'}, function () {
                                    $('#crawler_books_chapter_datagrid').bootstrapTable('refresh');
                                });
                            });
                        },
                        'click .edit': function (e, value, row, index) {

                        },
                        'click .remove': function (e, value, row, index) {
                            remove(value, row, index);
                        }
                    }
                }]
        });

        //指定操作组
        function operateFormatter(value, row, index) {
            return [
                '<a id="generate" href="javascript:void(0);" title="generate"><i class="fa fa-cloud-upload"></i></a>&nbsp;&nbsp;&nbsp;',
                '<a id="remove" href="javascript:void(0);" onclick="javascript:layer.msg(\'暂未实现\')" title="remove"><i class="glyphicon glyphicon-remove"></i></a>'
            ].join('');
        }

        function remove(value, row, index) {
            console.log(value, row, index);
        }

        function actionFormatter(value, row, index) {
            var id = value;
            var result = "";
            result += "<a href='javascript:void(0);' onclick='generate('" + id + "')'><i class='fa fa-cloud-upload'></i> cloud-upload</a>";
            result += "<a href='javascript:void(0);' class='btn btn-xs green' onclick=\"editViewById('" + id + "')\" title='查看'><span class='glyphicon glyphicon-search'></span></a>";
            result += "<a href='javascript:void(0);' class='btn btn-xs blue' onclick=\"javascrpit:layer.msg('暂未实现')\" title='编辑'><span class='glyphicon glyphicon-pencil'></span></a>";
            result += "<a href='javascript:void(0);' class='btn btn-xs red' onclick=\"deleteById('" + id + "')\" title='删除'><span class='glyphicon glyphicon-remove'></span></a>";
            return result;
        }

        /*]]>*/

    });
</script>
<div class="ibox float-e-margins animated fadeInRight">
    <div class="ibox-content">
        <div class="table-responsive">
            <table id="crawler_books_chapter_datagrid"
                   data-toolbar="#toolbar" data-show-refresh="true"
                   data-show-toggle="true" data-show-columns="true"
                   data-show-footer="false" data-mobile-responsive="true">
            </table>
        </div>
    </div>
</div>
</html>
