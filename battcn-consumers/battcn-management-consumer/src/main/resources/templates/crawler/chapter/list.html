<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
>
<script th:inline="javascript">
    $(function () {
        /*<![CDATA[*/
        $('#crawler_books_[[${bookNo}]]_chapter_datagrid').bootstrapTable({
            url: '/crawler/books/' + [[${bookNo}]] + '/chapters',
            height: '100%',
            sortName: 'gmt_create',
            sortOrder: 'desc',
            striped: true,
            pagination: true,
            pageSize: 20,
            search: false,
            sidePagination: 'server',
            idField: 'id',
            uniqueId: 'id',
            responseHandler: responseHandler,
            queryParams: queryParams,
            minimumCountColumns: 2,
            clickToSelect: true,
            columns: [
                {
                    checkbox: true
                }, {
                    field: 'bookNo',
                    title: '编号',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'link',
                    title: '文章链接',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'title',
                    title: '标题',
                    align: 'center',
                    valign: 'middle',
                    width: '80px'
                }, {
                    field: 'gmtCreate',
                    title: '时间',
                    align: 'center',
                    valign: 'middle',
                    width: '140px',
                    formatter: function (value, row, index) {
                        return new Date(value).pattern("yyyy-MM-dd HH:mm");
                    }
                }, {
                    field: 'status',
                    title: '是否已生成模板',
                    align: 'center',
                    valign: 'middle',
                    sortable: true,
                    formatter: function (value, row, index) {
                        return value === 1 ? '<i class="fa fa-check text-navy"></i>' : '<i class="fa fa-close text-danger"></i>'
                    }
                }]
        });

        /*]]>*/

    });
</script>
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="ibox float-e-margins">
        <div class="ibox-content">
            <div class="table-responsive">
                <table th:id="@{crawler_books_{bookNo}_chapter_datagrid(bookNo=${bookNo})}"
                       data-toolbar="#toolbar" data-show-refresh="true"
                       data-show-toggle="true" data-show-columns="true"
                       data-show-footer="false" data-mobile-responsive="true">
                </table>
            </div>
        </div>
    </div>
</div>
</html>
