<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
>
<script th:inline="javascript">
    $(function () {
        /*<![CDATA[*/
        battcn.ns('battcn.admin.menu[[${OP.menuId}]]');
        $('#admin_menu[[${OP.menuId}]]_datagrid').bootstrapTable({
            url: [[${MENU.channel}]] + '/query',
            height: '100%',
            sortName: 'gmt_create',
            sortOrder: 'desc',
            striped: true,
            pagination: true,
            pageSize: 20,
            search: false,
            sidePagination: 'server',
            idField: 'id',
            uniqueId: 'id',
            responseHandler: responseHandler,
            queryParams: queryParams,
            minimumCountColumns: 2,
            clickToSelect: true,
            columns: [
                {
                    checkbox: true
                }, {
                    field: 'bookNo',
                    title: '编号',
                    align: 'center',
                    valign: 'middle',
                    formatter: function (value, row, index) {
                        return '<a href="javascript:void(0)">' + value + '</a>';
                    }
                }, {
                    field: 'name',
                    title: '名称',
                    align: 'center',
                    valign: 'middle',
                    width: '80px'
                },
                {
                    field: 'source',
                    title: '来源',
                    align: 'center',
                    valign: 'middle'
                },
                {
                    field: 'type',
                    title: '类型',
                    align: 'center',
                    valign: 'middle',
                    width: '80px'
                },
                {
                    field: 'author',
                    title: '作者',
                    align: 'center',
                    valign: 'middle',
                    width: '80px'
                }, {
                    field: 'description',
                    title: '描述',
                    align: 'center',
                    valign: 'middle'
                }, {
                    field: 'gmtCreate',
                    title: '时间',
                    align: 'center',
                    valign: 'middle',
                    width: '140px',
                    formatter: function (value, row, index) {
                        return new Date(value).pattern("yyyy-MM-dd HH:mm")
                    }
                }, {
                    field: 'status',
                    title: '是否完结',
                    align: 'center',
                    valign: 'middle',
                    sortable: true,
                    formatter: function (value, row, index) {
                        return value === 1 ? '<i class="fa fa-check text-navy"></i>' : '<i class="fa fa-close text-danger"></i>'
                    }
                }],
            onClickRow: function (row, $element, field) {
                if (field === 'bookNo') {
                    // 弹出章节列表
                    battcn.showWindow({
                        title: '章节列表',
                        href: '/crawler/books/chapter/list?book_no=' + row.bookNo,
                        width: '90%',
                        height: '90%',
                        cancelhandler: function () {
                            battcn.closeWindow();
                        }
                    });
                }
            }
        });

        /*]]>*/

    });
</script>
<div class="wrapper wrapper-content animated fadeInRight">
    <div class="ibox float-e-margins">
        <div class="ibox-content">
            <div th:include="toolbar :: toolbar-operate"></div>
            <div class="table-responsive">
                <table th:id="@{admin_menu{menuId}_datagrid(menuId=${OP.menuId})}"
                       data-toolbar="#toolbar" data-show-refresh="true"
                       data-show-toggle="true" data-show-columns="true"
                       data-show-footer="false" data-mobile-responsive="true">
                </table>
            </div>
        </div>
    </div>
</div>
</html>
