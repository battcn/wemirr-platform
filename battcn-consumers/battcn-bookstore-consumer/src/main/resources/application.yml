server:
  port: 9090
spring:
  application:
    name: battcn-bookstore-consumer
  swagger:
    base-package: com.battcn
  redis:
    password: battcn
    battcn:
      lock:
        db: 3
        enabled: true
      sequence:
        enabled: true
        db: 2
        profile: dev
      cache:
        enabled: true
        db: 1
    timeout: 10000
    pool:
      min-idle: 10
      max-active: 200
      max-idle: 100
      max-wait: 1000
management:
  port: 9091
  health:
    db:
      enabled: false
    dubbo:
      status:
        defaults: memory
dubbo:
  application:
    id: battcn-management-consumer
    name: battcn-management-consumer
    qos-port: 22223
endpoints:
  dubbo:
    enabled: true

battcn:
  exception:
    mvc:
      enabled: true
      default-message: 服务繁忙,请稍后再试
      expose-error-class: true
    token:
      expiration-time: 10
      refresh-exp-time: 30
      issuer: http://blog.battcn.com
      signing-key: battcn