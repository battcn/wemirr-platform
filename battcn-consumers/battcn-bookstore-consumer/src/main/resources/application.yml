server:
  port: 9090
spring:
  application:
    name: battcn-bookstore-consumer
  swagger:
    base-package: com.battcn
  redis:
    password: battcn
    battcn:
      sequence:
        enabled: true
        db: 2
        profile: dev

management:
  port: 9091
  health:
    db:
      enabled: false
    dubbo:
      status:
        defaults: memory
dubbo:
  application:
    id: battcn-management-consumer
    name: battcn-management-consumer
    qos-port: 22223
endpoints:
  dubbo:
    enabled: true

battcn:
  exception:
    mvc:
      enabled: true
      default-message: 服务繁忙,请稍后再试
      expose-error-class: true